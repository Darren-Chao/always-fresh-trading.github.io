const labels={veg:"Vegetables",fruit:"Fruits",other:"Other goods"};
let activeFilter="all";

function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  render();
}

function render(){
  const q=document.getElementById("search").value.toLowerCase();
  const listEl=document.getElementById("list");
  const countEl=document.getElementById("count");
  let total=0,html="";
  const cats=activeFilter==="all"?["veg","fruit","other"]:[activeFilter];
  cats.forEach(cat=>{
    const items=D[cat].filter(item=>{
      if(!q)return true;
      return item.name.toLowerCase().includes(q)||item.zh.includes(q)||item.id.toLowerCase().includes(q)||item.regions.some(r=>r.toLowerCase().includes(q));
    });
    if(!items.length)return;
    total+=items.length;
    html+=`<div><div class="sec-title">${labels[cat]} (${items.length})</div>`;
    items.forEach(item=>{
      html+=`<div class="item"><div class="item-top"><span class="item-name">${item.name}</span><span class="item-zh">${item.zh}</span></div><div class="item-meta"><span class="tag tag-id">#${item.id}</span>`;
      item.regions.forEach(r=>{
        if(r==="N/A"){html+=`<span class="tag tag-na">Region: N/A</span>`;}
        else{html+=`<span class="tag tag-region">${r}</span>`;}
      });
      html+=`</div></div>`;
    });
    html+=`</div>`;
  });
  listEl.innerHTML=html||`<p style="color:var(--color-text-tertiary);font-size:14px;padding-top:1rem;">No results found.</p>`;
  countEl.textContent=`${total} item${total!==1?"s":""} shown`;
}
render();
</script>
